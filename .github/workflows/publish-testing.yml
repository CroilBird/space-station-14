name: Publish Testing

concurrency:
  group: publish-testing
  cancel-in-progress: true

on:
  workflow_dispatch:
  schedule:
  - cron: '0 10 * * *'

jobs:
  update-changelog:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v7
      with:
        sparse-checkout: 'Resources/Changelog'
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Update changelog YML
      run: dotnet run --project Changelog update -d Resources/Changelog
      env:
        REPO: space-wizards/space-station-14
        BRANCH: master
        GITHUB_TOKEN: {{ secrets.GITHUB_TOKEN }}

    - name: Commit changelog update
      uses: stefanzweifel/git-auto-commit-action@v4
      with:
        file_pattern: 'Resources/Changelog/*.yml'
        commit_message: Automated changelog update

  build:
    runs-on: ubuntu-latest

    needs: update-changelog

    steps:
    - uses: actions/checkout@v7
      with:
        submodules: 'recursive'
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Install dependencies
      run: sudo apt-get install -y python3-paramiko python3-lxml

    - name: Get Engine Tag
      run: |
        cd RobustToolbox
        git fetch --depth=1

    - name: Install dependencies
      run: dotnet restore

    - name: Build Packaging
      run: dotnet build Content.Packaging --configuration Release --no-restore /m

    - name: Package server
      run: dotnet run --project Content.Packaging server --platform win-x64 --platform win-arm64 --platform linux-x64 --platform linux-arm64 --platform osx-x64 --platform osx-arm64

    - name: Package client
      run: dotnet run --project Content.Packaging client --no-wipe-release

    - name: Publish version
      run: Tools/publish_multi_request.py --fork-id wizards-testing
      env:
        PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        GITHUB_REPOSITORY: ${{ vars.GITHUB_REPOSITORY }}

    - name: Publish changelog (RSS)
      continue-on-error: true
      run: Tools/actions_changelog_rss.py
      env:
        CHANGELOG_RSS_KEY: ${{ secrets.CHANGELOG_RSS_KEY }}
